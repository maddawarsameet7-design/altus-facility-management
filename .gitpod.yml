# Gitpod configuration to auto-launch Altus
image: gitpod/workspace-full

tasks:
  - name: Setup Backend
    init: |
      cd backend
      python -m venv venv
      source venv/bin/activate
      pip install -r requirements.txt
      python manage.py migrate
    command: |
      source venv/bin/activate
      python manage.py runserver 0.0.0.0:8000

  - name: Setup Frontend
    init: |
      cd frontend-web
      npm install
    command: |
      npm run dev

ports:
  - port: 8000
    onOpen: ignore
  - port: 5173
    onOpen: notify
    visibility: public
