# Full Automation for Altus Launch
image: gitpod/workspace-full

tasks:
  - name: Backend Launch
    init: |
      cd backend
      python -m venv venv
      source venv/bin/activate
      pip install -r requirements.txt
      python manage.py migrate
      echo "from django.contrib.auth import get_user_model; User = get_user_model(); User.objects.filter(username='admin').exists() or User.objects.create_superuser('admin', 'admin@altus.tech', 'password123')" | python manage.py shell
    command: |
      source venv/bin/activate
      python manage.py runserver 0.0.0.0:8000

  - name: Frontend Launch
    init: |
      cd frontend-web
      npm install
    command: |
      npm run dev

ports:
  - port: 8000
    onOpen: ignore
    visibility: public
  - port: 5173
    onOpen: notify
    visibility: public
